<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Actes de Décès - Kelibia Smart City</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .arabic-font {
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html" data-i18n="home"><i class="fas fa-city me-2"></i>Kelibia Smart
                City</a>
            <div class="d-flex align-items-center">
                <div class="btn-group me-3" role="group">
                    <button type="button" class="btn btn-sm btn-outline-light" onclick="setLanguage('fr')"
                        title="Français">
                        <img src="https://flagcdn.com/w40/fr.png" width="20" alt="FR">
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-light" onclick="setLanguage('ar')"
                        title="العربية">
                        <img src="https://flagcdn.com/w40/tn.png" width="20" alt="TN">
                    </button>
                </div>
                <button class="btn btn-outline-light btn-sm" onclick="logout()" data-i18n="logout">Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="fw-bold text-primary"><i class="fas fa-file-invoice me-2"></i>Mes Actes de Décès (Famille)</h2>
                    <p class="text-muted">Extraction numérique immédiate des actes de décès des membres rattachés à votre profil.</p>
                </div>
                <a href="services.html" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i>Retour aux services</a>
            </div>
        </div>

        <div id="loadingSpinner" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Recherche des actes de décès en cours...</p>
        </div>

        <div id="errorContainer" class="d-none">
            <div class="alert alert-danger" id="errorMessage"></div>
        </div>

        <div id="contentContainer" class="d-none">
            <div id="decesContainer" class="row">
                <!-- Rempli par le js -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/lang.js"></script>
    <script>
        const token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = 'login.html';
        }

        async function fetchDeces() {
            try {
                const response = await fetch('/extrait-deces/api/mes-deces/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                document.getElementById('loadingSpinner').classList.add('d-none');

                if (!response.ok) {
                    const errorData = await response.json();
                    document.getElementById('errorContainer').classList.remove('d-none');
                    document.getElementById('errorMessage').innerHTML = `
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <strong>Erreur</strong>: ${errorData.error || "Impossible de trouver les actes de décès."}
                    `;
                    return;
                }

                const data = await response.json();
                document.getElementById('contentContainer').classList.remove('d-none');
                renderDeces(data.deces);

            } catch (error) {
                console.error('Error fetching deces:', error);
                document.getElementById('loadingSpinner').classList.add('d-none');
                document.getElementById('errorContainer').classList.remove('d-none');
                document.getElementById('errorMessage').textContent = "Erreur de connexion avec la base de données.";
            }
        }

        function createDecesCard(deces) {
            const lang = getLanguage();
            const nomComplet = lang === 'ar' ? deces.nom_complet_ar : deces.nom_complet_fr;
            const baseUrl = 'http://127.0.0.1:8000';
            
            return `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card shadow-sm h-100 border-dark" style="border-width: 2px;">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <i class="fas fa-file-invoice fa-2x text-dark opacity-50"></i>
                                <span class="badge bg-dark rounded-pill">Acte N° ${deces.numero_registre} / ${deces.annee_acte}</span>
                            </div>
                            <h5 class="card-title fw-bold">${nomComplet}</h5>
                            <p class="card-text text-muted mb-4"><i class="fas fa-calendar-times me-2"></i>${deces.date_deces}</p>
                            
                            <div class="d-flex gap-2">
                                <a href="${baseUrl}${deces.url_fr}" target="_blank" class="btn btn-dark flex-fill fw-bold">
                                    <i class="fas fa-print me-1"></i> Version FR
                                </a>
                                <a href="${baseUrl}${deces.url_ar}" target="_blank" class="btn btn-outline-dark flex-fill arabic-font fw-bold">
                                    <i class="fas fa-print me-1"></i> النسخة العربية
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderDeces(decesList) {
            const container = document.getElementById('decesContainer');
            if (decesList && decesList.length > 0) {
                container.innerHTML = decesList.map(d => createDecesCard(d)).join('');
            } else {
                container.innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-secondary text-muted">
                            <i class="fas fa-info-circle me-2"></i>Aucun acte de décès trouvé pour votre famille.
                        </div>
                    </div>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            window.location.href = 'login.html';
        }

        // Initialize Call
        initLanguage();
        fetchDeces();

        // Listen for lang changes
        const originalSetLanguage = window.setLanguage;
        window.setLanguage = function(lang) {
            if(originalSetLanguage) originalSetLanguage(lang);
            fetchDeces();
        }
    </script>
</body>

</html>
