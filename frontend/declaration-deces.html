<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Déclaration de Décès - Kelibia Smart City</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .arabic-font { font-family: 'Cairo', sans-serif; }
        .step-card { border-radius: 15px; border: none; }
        .form-label { font-weight: 600; color: #495057; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html" data-i18n="home"><i class="fas fa-city me-2"></i>Kelibia Smart City</a>
            <div class="d-flex align-items-center">
                <div class="btn-group me-3" role="group">
                    <button type="button" class="btn btn-sm btn-outline-light" onclick="changeLanguage('fr')">FR</button>
                    <button type="button" class="btn btn-sm btn-outline-light" onclick="changeLanguage('ar')">AR</button>
                </div>
                <a href="services.html" class="btn btn-outline-light btn-sm me-2" data-i18n="admin_services">Services</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card step-card shadow">
                    <div class="card-header bg-white p-4 border-0">
                        <h2 class="fw-bold text-primary mb-1" data-i18n="death_decl_title">Service de Déclaration de Décès</h2>
                        <p class="text-muted" data-i18n="death_decl_desc">Utilisez ce formulaire pour signaler le décès d'un parent ou d'un membre de votre famille.</p>
                    </div>
                    <div class="card-body p-4">
                        <form id="deathDeclarationForm">
                            <div class="mb-4">
                                <label for="defunt" class="form-label" data-i18n="select_relative">Sélectionnez le défunt</label>
                                <select class="form-select form-select-lg" id="defunt" required>
                                    <option value="" data-i18n="loading">Chargement...</option>
                                </select>
                                <div id="noRelativesMsg" class="alert alert-warning mt-2 d-none" data-i18n="no_eligible_relatives"></div>
                            </div>

                            <div class="mb-4">
                                <label for="date_deces" class="form-label" data-i18n="date_of_death">Date et heure du décès</label>
                                <input type="datetime-local" class="form-control" id="date_deces" required>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label for="lieu_deces_fr" class="form-label" data-i18n="place_of_death_fr">Lieu du décès (Français)</label>
                                    <input type="text" class="form-control" id="lieu_deces_fr" placeholder="Hôpital de Kelibia" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="lieu_deces_ar" class="form-label" data-i18n="place_of_death_ar">Lieu du décès (Arabe)</label>
                                    <input type="text" class="form-control" id="lieu_deces_ar" placeholder="مستشفى قليبية" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="commentaire" class="form-label" data-i18n="comments">Commentaires / Observations</label>
                                <textarea class="form-control" id="commentaire" rows="3"></textarea>
                            </div>

                            <div class="d-grid pt-3">
                                <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                                    <i class="fas fa-paper-plane me-2"></i><span data-i18n="submit">Envoyer la déclaration</span>
                                </button>
                            </div>
                        </form>

                        <div id="successMsg" class="alert alert-success mt-4 d-none">
                            <i class="fas fa-check-circle me-2"></i><span data-i18n="declaration_success">Votre déclaration a été soumise avec succès.</span>
                            <div class="mt-3">
                                <a href="dashboard.html" class="btn btn-success btn-sm" data-i18n="dashboard">Retour au tableau de bord</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/lang.js"></script>
    <script>
        const token = localStorage.getItem('accessToken');
        if (!token) window.location.href = 'login.html';

        async function fetchEligibleRelatives() {
            try {
                const response = await fetch('http://127.0.0.1:8000/extrait-deces/api/declaration/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                const select = document.getElementById('defunt');
                select.innerHTML = '<option value="">-- ' + getTranslation('select_relative') + ' --</option>';
                
                if (data.eligible_relatives && data.eligible_relatives.length > 0) {
                    const lang = getLanguage();
                    data.eligible_relatives.forEach(rel => {
                        const name = lang === 'ar' ? `${rel.prenom_ar} ${rel.nom_ar}` : `${rel.prenom_fr} ${rel.nom_fr}`;
                        const option = document.createElement('option');
                        option.value = rel.id;
                        option.textContent = `${name} (CIN: ${rel.cin || 'N/A'})`;
                        select.appendChild(option);
                    });
                } else {
                    document.getElementById('noRelativesMsg').classList.remove('d-none');
                    document.getElementById('submitBtn').disabled = true;
                }
            } catch (error) {
                console.error('Error fetching relatives:', error);
            }
        }

        document.getElementById('deathDeclarationForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>' + getTranslation('processing');

            const payload = {
                defunt: document.getElementById('defunt').value,
                date_deces: document.getElementById('date_deces').value,
                lieu_deces_fr: document.getElementById('lieu_deces_fr').value,
                lieu_deces_ar: document.getElementById('lieu_deces_ar').value,
                commentaire: document.getElementById('commentaire').value
            };

            try {
                const response = await fetch('http://127.0.0.1:8000/extrait-deces/api/declaration/', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    document.getElementById('deathDeclarationForm').classList.add('d-none');
                    document.getElementById('successMsg').classList.remove('d-none');
                } else {
                    const err = await response.json();
                    alert(getTranslation('error_msg') + ': ' + JSON.stringify(err));
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>' + getTranslation('submit');
                }
            } catch (error) {
                console.error('Submission error:', error);
                submitBtn.disabled = false;
            }
        };

        function changeLanguage(lang) {
            setLanguage(lang);
            fetchEligibleRelatives();
        }

        initLanguage();
        fetchEligibleRelatives();
    </script>
</body>
</html>
