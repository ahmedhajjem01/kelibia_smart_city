<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Extraits - Kelibia Smart City</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .arabic-font {
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html" data-i18n="home"><i class="fas fa-city me-2"></i>Kelibia Smart
                City</a>
            <div class="d-flex align-items-center">
                <div class="btn-group me-3" role="group">
                    <button type="button" class="btn btn-sm btn-outline-light" onclick="setLanguage('fr')"
                        title="Français">
                        <img src="https://flagcdn.com/w40/fr.png" width="20" alt="FR">
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-light" onclick="setLanguage('ar')"
                        title="العربية">
                        <img src="https://flagcdn.com/w40/tn.png" width="20" alt="TN">
                    </button>
                </div>
                <button class="btn btn-outline-light btn-sm" onclick="logout()" data-i18n="logout">Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="fw-bold text-primary"><i class="fas fa-folder-open me-2"></i>Mes Extraits de Naissance</h2>
                    <p class="text-muted">Extraction numérique immédiate connectée au registre d'État Civil.</p>
                </div>
                <a href="services.html" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i>Retour aux services</a>
            </div>
        </div>

        <div id="loadingSpinner" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Vérification de votre identité et recherche des actes en cours...</p>
        </div>

        <div id="errorContainer" class="d-none">
            <div class="alert alert-danger" id="errorMessage"></div>
        </div>

        <div id="contentContainer" class="d-none">
            
            <h4 class="mb-3 border-bottom pb-2">Mon Extrait de Naissance</h4>
            <div id="monExtraitContainer" class="row mb-5">
                <!-- Rempli par le js -->
            </div>

            <h4 class="mb-3 border-bottom pb-2">Extraits de mes enfants</h4>
            <div id="enfantsContainer" class="row">
                <!-- Rempli par le js -->
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/lang.js"></script>
    <script>
        const token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = 'login.html';
        }

        async function fetchExtraits() {
            try {
                // Fetch Birth Extraits
                const birthResponse = await fetch('/extrait-naissance/api/mes-extraits/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                document.getElementById('loadingSpinner').classList.add('d-none');

                if (birthResponse.ok) {
                    const birthData = await birthResponse.json();
                    renderExtraits(birthData);
                }

                document.getElementById('contentContainer').classList.remove('d-none');

            } catch (error) {
                console.error('Error fetching extraits:', error);
                document.getElementById('loadingSpinner').classList.add('d-none');
                document.getElementById('errorContainer').classList.remove('d-none');
                document.getElementById('errorMessage').textContent = "Erreur de connexion avec la base de données.";
            }
        }


        function createCard(extrait) {
            const lang = getLanguage();
            const nomComplet = lang === 'ar' ? extrait.nom_complet_ar : extrait.nom_complet_fr;
            const baseUrl = 'http://127.0.0.1:8000';
            
            return `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card shadow-sm h-100 border-primary" style="border-width: 2px;">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <i class="fas fa-file-contract fa-2x text-primary opacity-50"></i>
                                <span class="badge bg-primary rounded-pill">N° ${extrait.n_etat_civil}</span>
                            </div>
                            <h5 class="card-title fw-bold">${nomComplet}</h5>
                            <p class="card-text text-muted mb-4"><i class="fas fa-birthday-cake me-2"></i>${extrait.date_naissance}</p>
                            
                            <div class="d-flex gap-2">
                                <a href="${baseUrl}${extrait.url_fr}" target="_blank" class="btn btn-outline-primary flex-fill">
                                    <i class="fas fa-print me-1"></i> FR
                                </a>
                                <a href="${baseUrl}${extrait.url_ar}" target="_blank" class="btn btn-primary flex-fill arabic-font">
                                    <i class="fas fa-print me-1"></i> بالعربية
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }


        function renderExtraits(data) {
            const monExtraitContainer = document.getElementById('monExtraitContainer');
            const enfantsContainer = document.getElementById('enfantsContainer');

            // Render Self Extract
            if (data.mon_extrait) {
                monExtraitContainer.innerHTML = createCard(data.mon_extrait);
            } else {
                monExtraitContainer.innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-secondary">
                            Aucun extrait de naissance correspondant à votre profil n'a été trouvé rattaché à votre compte.
                        </div>
                    </div>
                `;
            }

            // Render Conjoint Extracts
            if (data.conjoints && data.conjoints.length > 0) {
                const conjointDiv = document.createElement('div');
                conjointDiv.innerHTML = `<h4 class="mb-3 border-bottom pb-2 mt-4">Extrait de mon conjoint</h4><div class="row" id="conjointsList"></div>`;
                document.getElementById('contentContainer').insertBefore(conjointDiv, document.getElementById('enfantsContainer').previousElementSibling);
                const conjointsList = document.getElementById('conjointsList');
                data.conjoints.forEach(conjoint => {
                    conjointsList.innerHTML += createCard(conjoint);
                });
            }

            // Render Children Extracts
            if (data.enfants && data.enfants.length > 0) {
                enfantsContainer.innerHTML = '';
                data.enfants.forEach(enfant => {
                    enfantsContainer.innerHTML += createCard(enfant);
                });
            } else {
                enfantsContainer.innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-secondary text-muted">
                            <i class="fas fa-info-circle me-2"></i>Aucun acte de naissance d'enfant n'est rattaché à votre CIN.
                        </div>
                    </div>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            window.location.href = 'login.html';
        }

        // Initialize Call
        initLanguage();
        fetchExtraits();

        // Listen for lang changes to re-render names properly
        const originalSetLanguage = window.setLanguage;
        window.setLanguage = function(lang) {
            if(originalSetLanguage) originalSetLanguage(lang);
            fetchExtraits(); // Refetch to rebuild strings in AR/FR
        }
    </script>
</body>

</html>
