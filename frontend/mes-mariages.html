<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Mariages - Kelibia Smart City</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .arabic-font {
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html" data-i18n="home"><i class="fas fa-city me-2"></i>Kelibia Smart
                City</a>
            <div class="d-flex align-items-center">
                <div class="btn-group me-3" role="group">
                    <button type="button" class="btn btn-sm btn-outline-light" onclick="setLanguage('fr')"
                        title="Français">
                        <img src="https://flagcdn.com/w40/fr.png" width="20" alt="FR">
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-light" onclick="setLanguage('ar')"
                        title="العربية">
                        <img src="https://flagcdn.com/w40/tn.png" width="20" alt="TN">
                    </button>
                </div>
                <button class="btn btn-outline-light btn-sm" onclick="logout()" data-i18n="logout">Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="fw-bold text-primary"><i class="fas fa-ring me-2"></i>Mes Actes de Mariage</h2>
                    <p class="text-muted">Extraction numérique immédiate connectée au registre d'État Civil.</p>
                </div>
                <a href="services.html" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i>Retour aux services</a>
            </div>
        </div>

        <div id="loadingSpinner" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Recherche de vos actes de mariage en cours...</p>
        </div>

        <div id="errorContainer" class="d-none">
            <div class="alert alert-danger" id="errorMessage"></div>
        </div>

        <div id="contentContainer" class="d-none">
            
            <h4 class="mb-3 border-bottom pb-2">Mon Acte de Mariage</h4>
            <div id="mariageContainer" class="row mb-5">
                <!-- Rempli par le js -->
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/lang.js"></script>
    <script>
        const token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = 'login.html';
        }

        async function fetchMariages() {
            try {
                const response = await fetch('/extrait-mariage/api/mes-mariages/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                document.getElementById('loadingSpinner').classList.add('d-none');

                if (!response.ok) {
                    const errorData = await response.json();
                    document.getElementById('errorContainer').classList.remove('d-none');
                    document.getElementById('errorMessage').innerHTML = `
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <strong>Erreur</strong>: ${errorData.error || "Impossible de trouver vos actes de mariage."}
                    `;
                    return;
                }

                const data = await response.json();
                document.getElementById('contentContainer').classList.remove('d-none');
                renderMariages(data);

            } catch (error) {
                console.error('Error fetching mariages:', error);
                document.getElementById('loadingSpinner').classList.add('d-none');
                document.getElementById('errorContainer').classList.remove('d-none');
                document.getElementById('errorMessage').textContent = "Erreur de connexion avec la base de données.";
            }
        }

        function createMarriageCard(mariage) {
            const lang = getLanguage();
            const conjoint = lang === 'ar' ? mariage.conjoint_ar : mariage.conjoint_fr;
            const baseUrl = 'http://127.0.0.1:8000';
            const label = lang === 'ar' ? `زواج مع ${conjoint}` : `Mariage avec ${conjoint}`;
            
            return `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card shadow-sm h-100 border-warning" style="border-width: 2px;">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <i class="fas fa-ring fa-2x text-warning opacity-50"></i>
                                <span class="badge bg-warning text-dark rounded-pill">Acte N° ${mariage.numero_registre} / ${mariage.annee_acte}</span>
                            </div>
                            <h5 class="card-title fw-bold">${label}</h5>
                            <p class="card-text text-muted mb-4"><i class="fas fa-calendar-alt me-2"></i>${mariage.date_mariage}</p>
                            
                            <div class="d-flex gap-2">
                                <a href="${baseUrl}${mariage.url_fr}" target="_blank" class="btn btn-warning flex-fill fw-bold">
                                    <i class="fas fa-print me-1"></i> Version Française
                                </a>
                                <a href="${baseUrl}${mariage.url_ar}" target="_blank" class="btn btn-outline-warning flex-fill arabic-font fw-bold">
                                    <i class="fas fa-print me-1"></i> النسخة العربية
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderMariages(data) {
            const mariageContainer = document.getElementById('mariageContainer');
            if (data.mon_mariage) {
                mariageContainer.innerHTML = createMarriageCard(data.mon_mariage);
            } else {
                mariageContainer.innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-secondary text-muted">
                            <i class="fas fa-info-circle me-2"></i>Aucun acte de mariage trouvé pour votre profil.
                        </div>
                    </div>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            window.location.href = 'login.html';
        }

        // Initialize Call
        initLanguage();
        fetchMariages();

        // Listen for lang changes
        const originalSetLanguage = window.setLanguage;
        window.setLanguage = function(lang) {
            if(originalSetLanguage) originalSetLanguage(lang);
            fetchMariages();
        }
    </script>
</body>

</html>
