<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Kélibia Smart City</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body { background: #0d1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 2rem; width: 100%; max-width: 400px; }
    .login-header { text-align: center; margin-bottom: 2rem; }
    .login-logo { width: 52px; height: 52px; background: #185FA5; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 24px; }
    .login-title { color: white; font-size: 20px; font-weight: 500; }
    .login-sub { color: #6e7681; font-size: 13px; margin-top: 4px; }
    .form-label { color: #8b949e; font-size: 12px; }
    .form-control { background: #0d1117; border: 1px solid #30363d; color: white; font-size: 14px; }
    .form-control:focus { background: #0d1117; border-color: #1f6feb; color: white; box-shadow: 0 0 0 3px rgba(31,111,235,0.15); }
    .form-control::placeholder { color: #484f58; }
    .btn-login { background: #185FA5; border: none; color: white; width: 100%; padding: 10px; font-size: 14px; font-weight: 500; border-radius: 6px; }
    .btn-login:hover { background: #0C447C; color: white; }
    .login-footer { text-align: center; margin-top: 1.5rem; }
    .login-footer a { color: #58a6ff; font-size: 12px; text-decoration: none; }
    .alert-danger { background: #3d1c1c; border-color: #f85149; color: #f85149; font-size: 12px; }
</style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <div class="login-logo">🏙️</div>
        <div class="login-title">Kélibia Smart City</div>
        <div class="login-sub">Portail citoyen & agent municipal</div>
    </div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">Adresse Email</label>
            <input type="email" class="form-control" id="email" placeholder="nom@exemple.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>
        <div id="error-message" class="alert alert-danger d-none"></div>
        <button type="submit" class="btn-login" id="loginBtn">
            <span class="spinner-border spinner-border-sm d-none" id="spinner"></span>
            Se connecter
        </button>
    </form>

    <div class="login-footer">
        <a href="/signup/">Créer un compte</a> &nbsp;·&nbsp;
        <a href="/forgot-password/">Mot de passe oublié ?</a>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('error-message');
    const loginBtn = document.getElementById('loginBtn');
    const spinner = document.getElementById('spinner');

    errorDiv.classList.add('d-none');
    loginBtn.disabled = true;
    spinner.classList.remove('d-none');

    try {
        const response = await fetch('http://127.0.0.1:8000/api/token/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
            // Stocker le token (harmonisé avec dashboard)
            localStorage.setItem('access_token', data.access);
            localStorage.setItem('refresh_token', data.refresh);
            localStorage.setItem('user_type', data.user_type || 'citizen');

            // Redirection selon le rôle
            if (data.is_staff || data.is_superuser) {
                window.location.href = 'http://127.0.0.1:8000/admin/';
            } else if (data.user_type === 'agent') {
                window.location.href = 'http://127.0.0.1:8000/signalement/dashboard/';
            } else {
                window.location.href = 'http://127.0.0.1:8000/signalement/';
            }
        } else {
            throw new Error(data.detail || 'Identifiants incorrects');
        }
    } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('d-none');
    } finally {
        loginBtn.disabled = false;
        spinner.classList.add('d-none');
    }
});
</script>

</body>
</html>
