<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paiement Requis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; text-align: center; }
        .icon-box { color: #f39c12; font-size: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card p-5">
        <div class="icon-box">
            <i class="fas fa-lock"></i>
        </div>
        <h2 className="fw-bold mb-3">Service Verrouillé</h2>
        <p className="text-muted mb-4">
            L'accès à ce document administratif est restreint. Vous devez d'abord régler les frais de dossier (0.500 DT) via le portail citoyen.
        </p>
        <div class="d-grid gap-2">
            <a href="/paiement?amount=0.500&reason=Extrait de Naissance&requestId={{ extrait.id }}&requestType=birth_extract" class="btn btn-warning btn-lg rounded-pill fw-bold">
                <i class="fas fa-credit-card me-2"></i> Payer maintenant
            </a>
            <a href="javascript:window.close();" class="btn btn-link text-muted mt-2">Fermer</a>
        </div>
    </div>
</body>
</html>
